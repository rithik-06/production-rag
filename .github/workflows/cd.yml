name: CD Pipeline

# Runs only when code is merged to main
on:
  push:
    branches: [main]

jobs:

  # ── Job 1: Build & Push Docker Image ─────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/production-rag:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/production-rag:latest

      - name: Notify success
        run: echo "✅ Docker image pushed successfully!"